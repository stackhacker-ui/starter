name: Bug report
description: Report a reproducible bug
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug.
        Please provide enough detail to reproduce the issue.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A short description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact commands or actions
      placeholder: |
        1. Run ...
        2. Open ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should happen instead?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node.js version, pnpm version, browser
      placeholder: macOS 14, Node 22, pnpm 10, Chrome 136
    validations:
      required: true
